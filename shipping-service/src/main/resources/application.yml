server:
  port: 8087

spring:
  application:
    name: shipping-service

  # Base de Datos H2
  datasource:
    url: jdbc:h2:file:./data/ShippingDB
    driverClassName: org.h2.Driver
    username: sa
    password: sa

  # Consola Web H2
  h2:
    console:
      enabled: true
      path: /h2-console

  # JPA e Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

# Logs de consultas SQL
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

# Documentación Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

# Cliente Eureka
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true