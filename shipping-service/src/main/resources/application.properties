spring.application.name=Shipping-service
server.port=8087
spring.datasource.url=jdbc:h2:file:./data/ShippingDB
# Driver
spring.datasource.driverClassName=org.h2.Driver
# USUARIO Y CONTRASEŃA
spring.datasource.username=sa
spring.datasource.password=sa
# CONSOLA WEB DE H2:
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update

# Muestra las consultas SQL en consola.
spring.jpa.show-sql=true

# Hace que la consulta mostrada en consola se vea ordenado
spring.jpa.properties.hibernate.format_sql=true

# Muestra las consultas SQL ejecutadas por Hibernate.
logging.level.org.hibernate.SQL=DEBUG
# Muestra parametros enviados en consultas SQL.
logging.level.org.hibnate.type.descriptor.sql.BasicBinder=TRACE