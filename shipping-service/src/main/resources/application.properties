# =========================================================
# CONFIGURACIÓN GENERAL DEL MICROSERVICIO
# =========================================================
spring.application.name=Shipping-service
server.port=8087

# =========================================================
# CONFIGURACIÓN DE PERSISTENCIA (H2 DATABASE)
# =========================================================
# URL: Se usa un archivo local para persistir datos entre reinicios
spring.datasource.url=jdbc:h2:file:./data/ShippingDB
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=sa

# Estrategia de generación de tablas: 
# 'update' es ideal para desarrollo continuo sin perder datos previos.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =========================================================
# CONSOLA H2 (Acceso: http://localhost:8085/h2-console)
# =========================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
# Importante: Permite que la consola se vea correctamente en navegadores modernos
spring.h2.console.settings.web-allow-others=true

# =========================================================
# CONFIGURACIÓN DE COMUNICACIÓN (FEIGN CLIENTS)
# =========================================================
# Definimos la URL del servicio de productos para que sea dinámica
product.service.url=http://localhost:8081

# =========================================================
# DEPURACIÓN Y LOGGING (ESTÁNDAR UNIVERSITARIO)
# =========================================================
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Deshabilita la advertencia de Open-In-View en consola
spring.jpa.open-in-view=false