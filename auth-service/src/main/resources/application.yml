server:
  port: 8082

spring:
  application:
    name: Auth-service

  # Configuracin de Base de Datos H2
  datasource:
    url: jdbc:h2:file:./data/AuthDB
    driverClassName: org.h2.Driver
    username: sa
    password: sa

  # Consola Web de H2
  h2:
    console:
      enabled: true
      path: /h2-console

  # Configuracin de JPA y Hibernate
  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    show-sql: true
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true

# Configuracin de Logs para ver las consultas SQL
logging:
  level:
    org:
      hibernate:
        SQL: DEBUG
        type:
          descriptor:
            sql:
              BasicBinder: TRACE

# Configuracin de Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    path: /doc/swagger-ui.html

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/